<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>youtube sender</title>
    <style>
        body { font-family: sans-serif; max-width: 650px; margin: 30px auto; padding: 20px; background: #f3f4f6; color: #1f2937; }
        .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 0.85em; color: #4b5563; }
        input, textarea, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 4px; }
        button { padding: 10px 15px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #2563eb; }
        .btn-green { background: #16a34a; width: 100%; font-size: 1.1em; padding: 12px; }
        .account-list { border: 1px solid #e5e7eb; padding: 10px; border-radius: 4px; max-height: 120px; overflow-y: auto; background: #f9fafb; }
        .account-item { display: flex; align-items: center; margin-bottom: 4px; }
        .account-item input { width: auto; margin-right: 8px; }
        .log-area { background: #111827; color: #34d399; padding: 12px; font-family: monospace; font-size: 0.85em; height: 180px; overflow-y: auto; border-radius: 4px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="box">
        <h3>1. アカウントCookie登録</h3>
        <div class="form-group">
            <label>アカウント名</label>
            <input type="text" id="accountName" placeholder="例: アカウントA">
        </div>
        <div class="form-group">
            <label>Get cookies.txt LOCALLY の中身を貼り付け</label>
            <textarea id="newCookieText" rows="5" placeholder="# Netscape HTTP Cookie File&#10;# http://curl.haxx.se/rfc/cookie_spec.html&#10;# This file was generated by Get cookies.txt LOCALLY..."></textarea>
        </div>
        <button class="btn-blue" onclick="addAccount()">アカウントを追加保存</button>
        <button onclick="clearAccounts()" style="background: #ef4444; margin-left: 10px;">全削除</button>
    </div>

    <div class="box">
        <h3>2. YouTube内部APIパラメータ設定</h3>
        <div class="form-group">
            <label>送信タイプ</label>
            <select id="targetType">
                <option value="live">ライブチャット</option>
                <option value="video">動画コメント</option>
            </select>
        </div>
        <div class="form-group">
            <label>エンドポイントURL (key=... まで含むURLぜんぶ)</label>
            <input type="text" id="endpointUrl" placeholder="https://www.youtube.com/youtubei/v1/live_chat/send_message?key=...">
        </div>
        <div class="form-group">
            <label>内部のぱらむず</label>
            <input type="text" id="innerParams" placeholder="例: CAasbQo7Cg91... などの長い英数字の文字列">
        </div>
    </div>

    <div class="box">
        <h3>3. 送信コントロール</h3>
        <div class="form-group">
            <label>使用するアカウント</label>
            <div class="account-list" id="accountCheckboxes"></div>
        </div>
        <div class="form-group">
            <label>送信するメッセージ</label>
            <textarea id="message" rows="2" placeholder="こんにちは！"></textarea>
        </div>
        <div class="form-group">
            <label>待機パターン</label>
            <input type="text" id="delays" value="100, 200, 120">
        </div>
        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>ループ回数 </label>
                <input type="number" id="loopCount" value="5" min="1">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>APIシークレット</label>
                <input type="password" id="secret" value="himitsu">
            </div>
        </div>
        <button class="btn-green" id="sendBtn" onclick="startSending()">送信スタート</button>
    </div>

    <div class="box">
        <h3>ログ</h3>
        <div class="log-area" id="logArea">待機中...</div>
    </div>

    <script>
        const WORKER_URL = 'https://misty-block-8c7f.s103765s103765.workers.dev/api/send';
        let accounts = JSON.parse(localStorage.getItem('ytAccounts') || '[]');

        function updateAccountCheckboxes() {
            const container = document.getElementById('accountCheckboxes');
            container.innerHTML = accounts.length === 0 ? '<span style="color: #9ca3af;">アカウント未登録</span>' : '';
            accounts.forEach((acc, idx) => {
                const div = document.createElement('div');
                div.className = 'account-item';
                div.innerHTML = `<input type="checkbox" id="chk_${idx}" value="${idx}" checked><label for="chk_${idx}">${acc.name}</label>`;
                container.appendChild(div);
            });
        }

        function addAccount() {
            const name = document.getElementById('accountName').value;
            const cookieText = document.getElementById('newCookieText').value;
            if (!name || !cookieText) return alert("入力が足りません");
            
           
            if (!cookieText.includes('\t') && !cookieText.includes('SAPISID')) {
                return alert("Cookieの形式が正しくない可能性があります。Get cookies.txt LOCALLY 等で取得したテキストを貼り付けてください。");
            }

            accounts.push({ name, cookieText });
            localStorage.setItem('ytAccounts', JSON.stringify(accounts));
            document.getElementById('accountName').value = '';
            document.getElementById('newCookieText').value = '';
            updateAccountCheckboxes();
            alert(`「${name}」を登録しました。`);
        }

        function clearAccounts() { if (confirm("全削除しますか？")) { accounts = []; localStorage.removeItem('ytAccounts'); updateAccountCheckboxes(); } }
        function addLog(text) { const el = document.getElementById('logArea'); el.textContent += `\n[${new Date().toLocaleTimeString()}] ${text}`; el.scrollTop = el.scrollHeight; }
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        async function startSending() {
            const checkboxes = document.querySelectorAll('.account-list input[type="checkbox"]:checked');
            const selectedIndexes = Array.from(checkboxes).map(cb => parseInt(cb.value));
            if (selectedIndexes.length === 0) return alert("アカウントを選んでください");

            const endpointUrl = document.getElementById('endpointUrl').value;
            const targetType = document.getElementById('targetType').value;
            const innerParams = document.getElementById('innerParams').value;
            const message = document.getElementById('message').value;
            const secret = document.getElementById('secret').value;
            const loopCount = parseInt(document.getElementById('loopCount').value) || 1;
            const delays = document.getElementById('delays').value.split(',').map(x => parseInt(x.trim()) || 100);

            if (!endpointUrl || !innerParams || !message || !secret) return alert("設定が未入力です");

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true; sendBtn.style.background = "#9ca3af";
            document.getElementById('logArea').textContent = "開始...";

            let delayIndex = 0;

            for (let loop = 1; loop <= loopCount; loop++) {
                addLog(`--- ループ [${loop} / ${loopCount}] ---`);
                for (let i = 0; i < selectedIndexes.length; i++) {
                    const acc = accounts[selectedIndexes[i]];
                    addLog(` [${acc.name}] 送信`);

                    let payloadTemplate = targetType === "video" ? {
                        context: { client: { clientName: "WEB", clientVersion: "2.20260615.00.00" } },
                        commentText: "__MESSAGE__",
                        createCommentParams: innerParams
                    } : {
                        context: { client: { clientName: "WEB", clientVersion: "2.20260615.00.00" } },
                        params: innerParams,
                        clientMessageId: "__CLIENT_MESSAGE_ID__",
                        richMessage: { textSegments: [{ text: "__MESSAGE__" }] }
                    };

                    try {
                        const res = await fetch(WORKER_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ endpointUrl, payloadTemplate, message, cookieText: acc.cookieText, secret })
                        });
                        const resText = await res.text();
                        if (res.ok) {
                            addLog(`  送信成功`);
                        } else {
                            addLog(`  サーバーエラー: ${resText}`);
                        }
                    } catch (e) { addLog(`  通信失敗: ${e.message}`); }

                    
                    const currentDelay = delays[delayIndex % delays.length];
                    delayIndex++;
                    addLog(`   ${currentDelay} ミリ秒待機`);
                    await sleep(currentDelay);
                }
            }
            addLog("全てのサイクルが終了しました。");
            sendBtn.disabled = false; sendBtn.style.background = "#16a34a";
        }
        updateAccountCheckboxes();
    </script>
</body>
</html>
